<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>方剂结构化讲解页</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; background: #f4f7fb; color: #1f2a37; }
    .container { width: 1280px; max-width: calc(100vw - 40px); margin: 20px auto 36px; }
    .topbar { display:flex; justify-content:space-between; align-items:flex-start; gap: 16px; margin-bottom:14px; }
    .title { margin: 0; font-size: 30px; }
    .sub { color:#667085; margin-top: 6px; line-height: 1.7; }
    .back { color:#1677ff; text-decoration:none; font-size:14px; margin-top: 10px; }

    .panel { background:#fff; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.06); padding:16px 18px; margin-bottom:14px; }
    .status { color:#344054; min-height:24px; }
    .error { color:#b42318; min-height:24px; }
    .ok { color:#027a48; }
    .warn { color:#b54708; }

    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
    .item { background:#fafbfc; border:1px solid #e9edf2; border-radius:12px; padding:12px; }
    .full { grid-column: span 2; }
    .label { font-size:12px; color:#667085; margin-bottom:6px; }
    .value { line-height:1.85; white-space:pre-wrap; }

    .chips { margin-top: 8px; }
    .chip { display:inline-block; margin:4px 8px 4px 0; padding:4px 10px; border-radius:999px; background:#eef4ff; color:#1d4ed8; cursor:pointer; border:1px solid #dbe7ff; }

    .viz-grid { display:grid; grid-template-columns: 2fr 1fr; gap:14px; }
    #compatGraph, #ratioChart { height: 460px; }
    .viz-fallback { color:#667085; font-size:13px; padding:8px 4px; }

    .story-wrap { background: linear-gradient(135deg,#fff7ed,#eff6ff); border:1px solid #fde6c8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title">方剂结构化讲解页</h1>
        <div class="sub">来源 / 组成 / 君臣佐使 / 功效主治 / 适用证候 / 加减应用 / 现代研究 / 配伍故事</div>
      </div>
      <a class="back" href="index.html">← 返回首页</a>
    </div>

    <div class="panel">
      <div id="status" class="status">正在加载...</div>
      <div id="conn" class="status"></div>
      <div id="error" class="error"></div>
    </div>

    <div class="panel">
      <h2 id="formulaName" style="margin:0 0 8px 0;">-</h2>
      <div id="summary" class="value">-</div>
      <div id="herbLinks" class="chips"></div>
    </div>

    <div class="panel">
      <div class="grid">
        <div class="item"><div class="label">1️⃣ 方剂来源</div><div id="source" class="value">-</div></div>
        <div class="item"><div class="label">2️⃣ 方剂组成</div><div id="composition" class="value">-</div></div>
        <div class="item"><div class="label">3️⃣ 君臣佐使分析</div><div id="roles" class="value">-</div></div>
        <div class="item"><div class="label">4️⃣ 功效与主治</div><div id="efficacy" class="value">-</div></div>
        <div class="item"><div class="label">5️⃣ 适用证候</div><div id="syndrome" class="value">-</div></div>
        <div class="item"><div class="label">6️⃣ 加减应用</div><div id="mods" class="value">-</div></div>
        <div class="item full"><div class="label">7️⃣ 现代研究</div><div id="modern" class="value">-</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="viz-grid">
        <div class="item">
          <div class="label">方剂配伍图（方剂居中，药物环绕）</div>
          <div id="compatGraph"></div>
          <div id="graphFallback" class="viz-fallback"></div>
        </div>
        <div class="item">
          <div class="label">剂量与组成比例</div>
          <div id="ratioChart"></div>
          <div id="pieFallback" class="viz-fallback"></div>
        </div>
      </div>
    </div>

    <div class="panel story-wrap">
      <div class="grid">
        <div class="item"><div class="label">方剂配伍小故事（君臣佐使）</div><div id="roleStory" class="value">-</div></div>
        <div class="item"><div class="label">方剂故事化讲解</div><div id="formulaStory" class="value">-</div></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8010";
    const MCP_BASE = "http://127.0.0.1:8001";

    function getQueryName() {
      return new URLSearchParams(window.location.search).get("name") || "";
    }
    function setText(id, val) {
      document.getElementById(id).innerText = (val && String(val).trim()) ? String(val) : "-";
    }
    function setStatus(s) { document.getElementById("status").innerText = s || ""; }
    function setError(s) { document.getElementById("error").innerText = s || ""; }
    function setConn(s, cls = "") {
      const el = document.getElementById("conn");
      el.className = `status ${cls}`.trim();
      el.innerText = s || "";
    }

    async function fetchJsonWithTimeout(url, options = {}, timeoutMs = 12000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const resp = await fetch(url, { ...options, signal: ctrl.signal });
        const text = await resp.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
        return { ok: resp.ok, status: resp.status, data };
      } finally {
        clearTimeout(t);
      }
    }

    async function checkConnections() {
      const [apiHealth, mcpHealth] = await Promise.all([
        fetchJsonWithTimeout(`${API_BASE}/health`, {}, 5000).catch(e => ({ ok:false, data:{error:e.message} })),
        fetchJsonWithTimeout(`${MCP_BASE}/health`, {}, 5000).catch(e => ({ ok:false, data:{error:e.message} })),
      ]);

      const apiMsg = apiHealth.ok ? "API:可用" : "API:不可用";
      const mcpMsg = mcpHealth.ok ? "MCP:可用" : "MCP:不可用";
      const cls = (apiHealth.ok && mcpHealth.ok) ? "ok" : "warn";
      setConn(`${apiMsg} | ${mcpMsg}`, cls);
    }

    function numFromDose(dose) {
      const m = String(dose || "").match(/(\d+(?:\.\d+)?)/);
      return m ? Number(m[1]) : 1;
    }

    function hasUsefulFormulaData(d) {
      if (!d || typeof d !== "object") return false;
      const fields = [
        d.source,
        d.efficacy_and_indications,
        d.applicable_syndromes,
        d.modifications,
        d.modern_research,
        d.role_story,
        d.formula_story,
      ];
      const textOk = fields.some(x => x && String(x).trim() && String(x).trim() !== "-");
      const compItemsOk = Array.isArray(d.composition_items) && d.composition_items.some(x => x && x.name);
      const compTextOk = Array.isArray(d.composition) && d.composition.length > 0;
      return textOk || compItemsOk || compTextOk;
    }

    async function getMcpFormulaFallback(name) {
      return fetchJsonWithTimeout(`${MCP_BASE}/tools/formula_fallback`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      }, 10000).catch(e => ({ ok:false, data:{error:e.message} }));
    }

    function mergeFormulaData(primary, fallback) {
      if (!primary || typeof primary !== "object") return fallback || {};
      if (!fallback || typeof fallback !== "object") return primary;
      const merged = { ...fallback, ...primary };
      const keys = [
        "summary", "source", "jun_chen_zuo_shi_analysis", "efficacy_and_indications",
        "applicable_syndromes", "modifications", "modern_research", "role_story", "formula_story"
      ];
      for (const k of keys) {
        const v = primary[k];
        if (!v || !String(v).trim()) merged[k] = fallback[k] || "";
      }
      if (!(Array.isArray(primary.composition_items) && primary.composition_items.length)) {
        merged.composition_items = Array.isArray(fallback.composition_items) ? fallback.composition_items : [];
      }
      if (!(Array.isArray(primary.composition) && primary.composition.length)) {
        merged.composition = Array.isArray(fallback.composition) ? fallback.composition : [];
      }
      merged._data_source = (hasUsefulFormulaData(primary) ? "主服务+MCP补全" : "MCP降级")
      return merged;
    }

    function renderHerbLinks(items) {
      const box = document.getElementById("herbLinks");
      box.innerHTML = "";
      if (!items || !items.length) return;

      const title = document.createElement("span");
      title.innerText = "点击中药跳转：";
      box.appendChild(title);

      items.forEach(it => {
        const span = document.createElement("span");
        span.className = "chip";
        span.innerText = `${it.name}${it.dose ? `（${it.dose}）` : ""}`;
        span.onclick = () => { window.location.href = `herb_page.html?name=${encodeURIComponent(it.name)}`; };
        box.appendChild(span);
      });
    }

    function renderComposition(items, compositionTextList) {
      if (items && items.length) {
        setText("composition", items.map(x => `${x.name}${x.dose ? ` ${x.dose}` : ""}${x.role ? `【${x.role}】` : ""}`).join("、"));
      } else {
        setText("composition", (compositionTextList || []).join("、") || "-");
      }
    }

    function renderCharts(name, items) {
      const graphFallback = document.getElementById("graphFallback");
      const pieFallback = document.getElementById("pieFallback");
      graphFallback.innerText = "";
      pieFallback.innerText = "";

      if (!window.echarts) {
        graphFallback.innerText = "图表库加载失败（CDN不可达），已展示文本信息。";
        pieFallback.innerText = "图表库加载失败（CDN不可达），已展示文本信息。";
        return;
      }

      const graphChart = echarts.init(document.getElementById("compatGraph"));
      const pieChart = echarts.init(document.getElementById("ratioChart"));

      const nodes = [{ id: "formula", name, symbolSize: 88, itemStyle: { color: "#f97316" } }];
      const links = [];
      const roleColor = { "君": "#ef4444", "臣": "#f59e0b", "佐": "#10b981", "使": "#3b82f6" };

      (items || []).forEach((it, idx) => {
        const nodeId = `h_${idx}`;
        const role = (it.role || "").trim();
        const w = Number(it.weight || 0);
        nodes.push({
          id: nodeId,
          name: `${it.name}${it.dose ? `\n${it.dose}` : ""}${role ? `\n${role}` : ""}`,
          symbolSize: Math.max(46, Math.min(78, 46 + (w > 0 ? w : numFromDose(it.dose)) * 2)),
          itemStyle: { color: roleColor[role] || "#64748b" },
        });
        links.push({ source: "formula", target: nodeId, label: { show: true, formatter: it.dose || role || "配伍" } });
      });

      graphChart.setOption({
        tooltip: {},
        series: [{
          type: "graph",
          layout: "force",
          roam: true,
          force: { repulsion: 420, edgeLength: [100, 180] },
          label: { show: true },
          data: nodes,
          links,
        }]
      });

      const pieData = (items || []).map(x => ({ name: x.name, value: Number(x.weight || 0) || numFromDose(x.dose) }));
      if (pieData.length) {
        pieChart.setOption({
          tooltip: { trigger: "item" },
          legend: { bottom: 0 },
          series: [{ type: "pie", radius: ["34%", "66%"], roseType: "area", data: pieData }]
        });
      } else {
        pieFallback.innerText = "暂无可解析剂量，未绘制比例图。";
      }

      window.addEventListener("resize", () => { graphChart.resize(); pieChart.resize(); });
    }

    async function loadFormula() {
      const name = getQueryName();
      if (!name) {
        setError("未检测到方剂名称参数（URL 需要 ?name=四君子汤）");
        setStatus("");
        return;
      }

      setStatus(`正在加载：${name}`);
      setError("");
      await checkConnections();

      let result;
      try {
        result = await fetchJsonWithTimeout(`${API_BASE}/api/formula_full`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: name })
        }, 60000);
      } catch (e) {
        result = { ok: false, status: 0, data: { error: e.message || "network error" } };
      }

      let data = result.data || {};
      const mainOk = result.ok && data && data.ok;

      if (!mainOk) {
        const backendErr = data.error || data.reason || `HTTP ${result.status}`;
        const fb = await getMcpFormulaFallback(name);
        if (fb.ok && fb.data && fb.data.ok) {
          data = fb.data;
          data._data_source = "MCP降级";
          setStatus(`已切换MCP降级数据：${name}`);
          setError(`主服务失败，已使用MCP：${backendErr}`);
        } else {
          const fbErr = (fb.data && (fb.data.error || fb.data.reason)) || "MCP fallback failed";
          setError(`主服务失败：${backendErr}；MCP降级也失败：${fbErr}`);
          setStatus("加载失败（请确认 API 8010、MCP 8001 与模型配置）");
          return;
        }
      } else {
        // 主服务可用但字段为空时，也调用 MCP 补全，避免页面出现大量“-”
        const needPatch = !hasUsefulFormulaData(data);
        const fb = await getMcpFormulaFallback(name);
        if (fb.ok && fb.data && fb.data.ok) {
          data = mergeFormulaData(data, fb.data);
          if (needPatch) {
            setStatus(`主服务字段不足，已使用MCP补全：${name}`);
          }
        } else {
          data._data_source = "主服务";
        }
      }

      setText("formulaName", data.name || name);
      setText("summary", data.summary || "-");
      setText("source", data.source || "-");
      setText("roles", data.jun_chen_zuo_shi_analysis || "-");
      setText("efficacy", data.efficacy_and_indications || data.efficacy || data.indications || "-");
      setText("syndrome", data.applicable_syndromes || data.syndrome_points || "-");
      setText("mods", data.modifications || "-");
      setText("modern", data.modern_research || data.modern_hint || "-");
      setText("roleStory", data.role_story || "-");
      setText("formulaStory", data.formula_story || "-");

      const items = Array.isArray(data.composition_items) ? data.composition_items : [];
      renderComposition(items, data.composition || []);
      renderHerbLinks(items);
      renderCharts(data.name || name, items);

      const src = data._data_source || "主服务";
      setStatus(`加载完成：${name}（数据源：${src}）`);
    }

    loadFormula();
  </script>
</body>
</html>
