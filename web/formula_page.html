<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>方剂讲解页</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f7fb; color: #222; }
    .container { width: 1200px; margin: 24px auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .back { color: #1677ff; text-decoration: none; font-size: 14px; }
    .title { font-size: 28px; margin: 0; }
    .sub { font-size: 14px; color: #666; margin-top: 6px; }
    .panel { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 18px 20px; margin-bottom: 16px; }
    .status { color: #666; font-size: 14px; min-height: 22px; }
    .error { color: #c0392b; font-size: 14px; min-height: 22px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .item { background: #fafbfc; border: 1px solid #eef0f3; border-radius: 12px; padding: 12px 14px; }
    .item.full { grid-column: span 2; }
    .label { font-size: 12px; color: #777; margin-bottom: 6px; }
    .value { font-size: 14px; line-height: 1.8; color: #222; white-space: pre-wrap; }
    ul { margin: 0; padding-left: 18px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title">方剂结构化讲解页</h1>
        <div class="sub">组成 · 功效 · 主治 · 方义 · 用法 · 注意事项</div>
      </div>
      <a class="back" href="index.html">← 返回首页</a>
    </div>

    <div class="panel">
      <div id="status" class="status">正在加载...</div>
      <div id="error" class="error"></div>
    </div>

    <div class="panel">
      <h2 id="formulaName" style="margin-top:0;">-</h2>
      <div class="grid">
        <div class="item full"><div class="label">一句话总结</div><div id="summary" class="value">-</div></div>
        <div class="item"><div class="label">出处</div><div id="source" class="value">-</div></div>
        <div class="item"><div class="label">功效</div><div id="efficacy" class="value">-</div></div>
        <div class="item full"><div class="label">组成</div><div id="composition" class="value">-</div></div>
        <div class="item full"><div class="label">主治</div><div id="indications" class="value">-</div></div>
        <div class="item full"><div class="label">证候要点</div><div id="syndrome" class="value">-</div></div>
        <div class="item full"><div class="label">方义简析</div><div id="analysis" class="value">-</div></div>
        <div class="item"><div class="label">用法用量</div><div id="dosage" class="value">-</div></div>
        <div class="item"><div class="label">现代提示</div><div id="modern" class="value">-</div></div>
        <div class="item full"><div class="label">注意事项</div><div id="cautions" class="value">-</div></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8010";

    function getQueryName() {
      const params = new URLSearchParams(window.location.search);
      return params.get("name") || "";
    }

    function setStatus(text) { document.getElementById("status").innerText = text || ""; }
    function setError(text) { document.getElementById("error").innerText = text || ""; }

    function fillText(id, val) {
      document.getElementById(id).innerText = val && String(val).trim() ? val : "-";
    }

    function renderFormula(data) {
      fillText("formulaName", data.name || "-");
      fillText("summary", data.summary || "-");
      fillText("source", data.source || "-");
      fillText("efficacy", data.efficacy || "-");

      const comp = Array.isArray(data.composition) ? data.composition : [];
      if (!comp.length) {
        fillText("composition", "-");
      } else {
        document.getElementById("composition").innerHTML = `<ul>${comp.map(x => `<li>${x}</li>`).join("")}</ul>`;
      }

      fillText("indications", data.indications || "-");
      fillText("syndrome", data.syndrome_points || "-");
      fillText("analysis", data.compatibility_analysis || "-");
      fillText("dosage", data.dosage_usage || "-");
      fillText("modern", data.modern_hint || "-");
      fillText("cautions", data.cautions || "-");
    }

    async function loadFormula() {
      const name = getQueryName();
      if (!name) {
        setError("未检测到方剂名称参数");
        setStatus("");
        return;
      }

      setStatus(`正在加载 ${name} ...`);
      setError("");

      try {
        const resp = await fetch(`${API_BASE}/api/formula_full`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: name })
        });
        const data = await resp.json();

        if (!data?.ok) {
          setError(data?.error || data?.reason || "请求失败");
          setStatus("加载失败");
          return;
        }

        renderFormula(data);
        setStatus(`已完成 ${name} 的讲解`);
      } catch (err) {
        setError("请求异常：" + err.message);
        setStatus("加载失败");
      }
    }

    loadFormula();
  </script>
</body>
</html>
