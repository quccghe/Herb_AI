<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中药拟人化展示页 Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      width: 1400px;
      margin: 24px auto;
    }

    .panel {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input, button {
      height: 40px;
      border-radius: 8px;
      font-size: 14px;
    }

    input {
      width: 260px;
      border: 1px solid #d9d9d9;
      padding: 0 12px;
      outline: none;
    }

    button {
      border: none;
      background: #1677ff;
      color: white;
      padding: 0 18px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
    }

    .left, .right {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .image-box {
      width: 100%;
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
      background: #f2f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #edf0f3;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .placeholder {
      color: #888;
      font-size: 14px;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      background: #eef4ff;
      color: #245bdb;
      border: 1px solid #d9e7ff;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      margin-top: 10px;
    }

    .info-item {
      background: #fafbfc;
      border: 1px solid #eef0f3;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .info-label {
      font-size: 12px;
      color: #777;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 14px;
      color: #222;
      line-height: 1.6;
      word-break: break-word;
    }

    .narration {
      line-height: 1.9;
      font-size: 15px;
      color: #333;
      white-space: pre-wrap;
    }

    .audio-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    audio {
      width: 100%;
    }

    .persona-box {
      background: #fafbfc;
      border: 1px solid #eef0f3;
      border-radius: 10px;
      padding: 12px;
      line-height: 1.8;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .error {
      color: #c0392b;
      font-size: 14px;
      margin-top: 8px;
    }

    .ok {
      color: #2d8f47;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="title">中药拟人化展示页</div>
      <div class="sub">展示内容：中药卡片 + Persona 图像 + 语音播放 + 人格化介绍</div>
      <div class="toolbar" style="margin-top: 12px;">
        <input id="herbInput" value="当归" placeholder="请输入中药名，例如：当归" />
        <button onclick="loadHerbDemo()">生成展示</button>
      </div>
      <div id="status" class="ok" style="margin-top:10px;">准备就绪</div>
      <div id="error" class="error"></div>
    </div>

    <div class="grid">
      <div class="left">
        <div class="panel">
          <div class="card-title">拟人化角色图像</div>
          <div class="image-box" id="imageBox">
            <div class="placeholder">暂无图像</div>
          </div>
        </div>

        <div class="panel">
          <div class="card-title">角色设定</div>
          <div id="personaBox" class="persona-box">暂无 Persona 信息</div>
        </div>

        <div class="panel">
          <div class="card-title">语音播放</div>
          <div class="audio-box">
            <audio id="audioPlayer" controls></audio>
            <div id="audioInfo" class="sub">暂无音频</div>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="panel">
          <div class="card-title">中药卡片</div>
          <div style="font-size:24px;font-weight:700;" id="herbName">-</div>
          <div class="tag-row" id="tagRow"></div>

          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">性味</div>
              <div class="info-value" id="tasteVal">-</div>
            </div>
            <div class="info-item">
              <div class="info-label">归经</div>
              <div class="info-value" id="meridianVal">-</div>
            </div>
            <div class="info-item">
              <div class="info-label">用量</div>
              <div class="info-value" id="dosageVal">-</div>
            </div>
            <div class="info-item">
              <div class="info-label">风险等级</div>
              <div class="info-value" id="riskVal">-</div>
            </div>
            <div class="info-item" style="grid-column: span 2;">
              <div class="info-label">功效</div>
              <div class="info-value" id="efficacyVal">-</div>
            </div>
            <div class="info-item" style="grid-column: span 2;">
              <div class="info-label">主治 / 相关病症</div>
              <div class="info-value" id="diseaseVal">-</div>
            </div>
            <div class="info-item" style="grid-column: span 2;">
              <div class="info-label">注意事项</div>
              <div class="info-value" id="precautionVal">-</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="card-title">人格化自我介绍</div>
          <div class="narration" id="narrationText">暂无内容</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MCP_BASE = "http://127.0.0.1:8010";

    function setStatus(text) {
      document.getElementById("status").innerText = text || "";
    }

    function setError(text) {
      document.getElementById("error").innerText = text || "";
    }

    function clearError() {
      setError("");
    }

    function toAssetUrl(path) {
      if (!path) return "";
      // 把 assets/audio/xxx.wav -> http://127.0.0.1:8001/assets/audio/xxx.wav
      if (path.startsWith("assets/")) {
        return `${MCP_BASE}/${path}`;
      }
      return path;
    }

    function renderCard(card) {
      document.getElementById("herbName").innerText = card?.name || "-";
      document.getElementById("tasteVal").innerText = card?.taste || "-";
      document.getElementById("meridianVal").innerText = card?.meridian || "-";
      document.getElementById("dosageVal").innerText = card?.dosage || "-";
      document.getElementById("riskVal").innerText = card?.risk_level || "-";
      document.getElementById("efficacyVal").innerText = (card?.efficacy || []).join("、") || "-";
      document.getElementById("diseaseVal").innerText = (card?.diseases || []).join("、") || "-";
      document.getElementById("precautionVal").innerText = card?.precaution || "-";

      const tagRow = document.getElementById("tagRow");
      tagRow.innerHTML = "";
      const tags = [];
      if (card?.taste) tags.push(`性味：${card.taste}`);
      if (card?.meridian) tags.push(`归经：${card.meridian}`);
      if (card?.risk_level) tags.push(card.risk_level);

      tags.forEach(t => {
        const span = document.createElement("span");
        span.className = "tag";
        span.innerText = t;
        tagRow.appendChild(span);
      });
    }

    function renderNarration(narration) {
      document.getElementById("narrationText").innerText = narration?.text || "暂无内容";
    }

    function renderPersona(persona) {
      const personaObj = persona?.persona || {};
      const html = `
        <div><b>角色称号：</b>${personaObj.role_title || "-"}</div>
        <div><b>年龄风格：</b>${personaObj.age_style || "-"}</div>
        <div><b>性格标签：</b>${(personaObj.personality_tags || []).join("、") || "-"}</div>
        <div><b>外观标签：</b>${(personaObj.appearance_tags || []).join("、") || "-"}</div>
        <div><b>口头禅：</b>${(personaObj.catchphrases || []).join(" / ") || "-"}</div>
      `;
      document.getElementById("personaBox").innerHTML = html;
    }

    function renderImage(image) {
      const box = document.getElementById("imageBox");
      box.innerHTML = "";

      if (!image?.ok || !image?.image_path) {
        box.innerHTML = `<div class="placeholder">暂无图像</div>`;
        return;
      }

      const img = document.createElement("img");
      img.src = toAssetUrl(image.image_path);
      img.alt = "persona image";
      box.appendChild(img);
    }

    function renderAudio(tts) {
      const audio = document.getElementById("audioPlayer");
      const info = document.getElementById("audioInfo");

      audio.removeAttribute("src");
      audio.load();

      if (!tts?.ok) {
        info.innerText = "暂无音频";
        return;
      }

      // 兼容你的结构：tts.tts.audio_path
      const audioPath = tts?.tts?.audio_path || tts?.audio_path || "";
      if (!audioPath) {
        info.innerText = "暂无音频路径";
        return;
      }

      const url = toAssetUrl(audioPath);
      audio.src = url;
      info.innerText = `音频文件：${audioPath}`;
    }

    async function mockOrFetchFullData(herbName) {
  const resp = await fetch("http://127.0.0.1:8010/api/herb_full", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ query: herbName })
  });

  return await resp.json();
}
    async function loadHerbDemo() {
      clearError();
      const herbName = document.getElementById("herbInput").value.trim();
      if (!herbName) {
        setError("请输入中药名");
        return;
      }

      setStatus(`正在生成 ${herbName} 的展示页...`);

      try {
        const data = await mockOrFetchFullData(herbName);

        if (!data?.ok) {
          setError(data?.error || "后端返回失败");
          setStatus("生成失败");
          return;
        }

        renderCard(data.card || {});
        renderNarration(data.narration || {});
        renderPersona(data.persona || {});
        renderAudio(data.tts || {});
        renderImage(data.image || {});

        setStatus(`已加载 ${herbName} 的展示页`);
      } catch (err) {
        setError(err.message || String(err));
        setStatus("请求异常");
      }
    }

    loadHerbDemo();
  </script>
</body>
</html>
